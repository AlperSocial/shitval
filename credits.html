<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credits</title>
    <link rel="stylesheet" href="css/index.css">
    <style>
        .credits-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            margin-top: 20px;
        }
        .credit-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .credit-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .credit-name {
            margin-top: 10px;
            font-size: 1.2em;
            font-weight: bold;
            color: #d1d1d1;
        }
        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1em;
            font-weight: bold;
            color: #fff;
            background: #7289da;
            border-radius: 8px;
            text-decoration: none;
            transition: background 0.3s;
        }
        .button:hover {
            background: #5b6eae;
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="content">
        <div class="nonacoustic-logo">
            <img src="cdn/logo.png" alt="Logo">
        </div>
        <h1>Credits</h1>
        <div class="credits-container">
            <div class="credit-item">
                <img src="cdn/AlperSocial.png" alt="AlperSocial" class="credit-image">
                <p class="credit-name">AlperSocial - Lead Developer and Founder</p>
            </div>
            <div class="credit-item">
                <img src="cdn/mstudio45.png" alt="mstudio45" class="credit-image">
                <p class="credit-name">mstudio45 - Developer</p>
            </div>
        </div>
        <a href="index.html" class="button">Back to Home</a>
    </div>
</body>
</html>
