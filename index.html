		<title>Shitval - Home</title>
		<link rel="icon" href="cdn/logo.png" type="image/png">
		<link rel="stylesheet" href="css/index.css">
	</head>
	
	<body>
		<div id="particles-js"></div>
		
		<div class="content">
			<div class="logo">
				<img src="cdn/logo.png" alt="Shitval Logo">

			<div class="buttons">
				<a href="revivals.html" class="button">Revivals</a>
				<!-- <a href="launchers.html" class="button">Launchers</a> -->

			</div>
			<div class="buttons">
				<a href="launchers.html" class="button">Launchers</a>
			</div>
		</div>
		
		<div class="gif-container">
			<img src="cdn/HAPPY-HAPPY-HAPPY.gif" alt="monkey"> <!--secret lmfao not needed no mo but its funny-->
		</div>
		
		<button class="info-button" onclick="document.getElementById('info-modal').style.display='flex'">?</button>
		
		<div id="info-modal" class="info-modal">
			<div class="modal-content">
				<span class="close" onclick="document.getElementById('info-modal').style.display='none'">&times;</span>

					<a href="mailto:contact@alper.boo" class="btn"><img src="cdn/Email_icon.png" alt="Email"></a>
					<a href="https://discord.com/invite/KAdGh2a54B" class="btn"><img src="cdn/discord-circle.png" alt="Discord"></a>
				</div>
				<!-- <div class="links"><a href="credits.html">Credits</a></a> --> <!-- will work on credits soon, its a secret between u and me ;) -->
			</div>
		</div>
	</body>
	
	<script src="cdn/oneko.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js" integrity="sha512-Kef5sc7gfTacR7TZKelcrRs15ipf7+t+n7Zh6mKNJbmW+/RRdCW9nwfLn4YX0s2nO6Kv5Y2ChqgIakaC6PW09A==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
	<script>
		particlesJS("particles-js", {
		    "particles": {
			"number": {
			    "value": 80,
			    "density": {
				"enable": true,
				"value_area": 800
			    }
			},
			"color": {
			    "value": "#ffffff"
			},
			"shape": {
			    "type": "circle",
			    "stroke": {
				"width": 0,
				"color": "#000000"
			    },
			    "polygon": {
				"nb_sides": 5
			    },
			    "image": {
				"src": "img/github.svg",
				"width": 100,
				"height": 100
			    }
			},
			"opacity": {
			    "value": 0.5,
			    "random": false,
			    "anim": {
				"enable": false,
				"speed": 1,
				"opacity_min": 0.1,
				"sync": false
			    }
			},
			"size": {
			    "value": 3,
			    "random": true,
			    "anim": {
				"enable": false,
				"speed": 40,
				"size_min": 0.1,
				"sync": false
			    }
			},
			"line_linked": {
			    "enable": true,
			    "distance": 150,
			    "color": "#ffffff",
			    "opacity": 0.4,
			    "width": 1
			},
			"move": {
			    "enable": true,
			    "speed": 6,
			    "direction": "none",
			    "random": false,
			    "straight": false,
			    "out_mode": "out",
			    "attract": {
				"enable": false,
				"rotateX": 600,
				"rotateY": 1200
			    }
			}
		    },
		    "interactivity": {
			"detect_on": "canvas",
			"events": {
			    "onhover": {
				"enable": true,
				"mode": "repulse"
			    },
			    "onclick": {
				"enable": true,
				"mode": "push"
			    },
			    "resize": true
			},
			"modes": {
			    "grab": {
				"distance": 400,
				"line_linked": {
				    "opacity": 1
				}
			    },
			    "bubble": {
				"distance": 400,
				"size": 40,
				"duration": 2,
				"opacity": 8,
				"speed": 3
			    },
			    "repulse": {
				"distance": 200,
				"duration": 0.4
			    },
			    "push": {
				"particles_nb": 4
			    },
			    "remove": {
				"particles_nb": 2
			    }
			}
		    },
		    "retina_detect": true
		});
	</script>
</html>
